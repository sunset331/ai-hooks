#!/bin/bash
# hooks.conf — 被所有 git hooks 和 CLI 脚本 source
#
# 统一环境变量配置。覆盖方式：
#   export AI_HOOKS_PYTHON=/path/to/python  # 在调用 hook 前设置
#   export AI_HOOKS_DIR=/path/to/ai-hooks   # 自动检测的路径

# AI_HOOKS_DIR — 本目录的绝对路径
: "${AI_HOOKS_DIR:="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"}"

# AI_HOOKS_PYTHON — Python 可执行文件路径（默认在 PATH 中查找）
: "${AI_HOOKS_PYTHON:=python}"

# PYTHONUTF8 — 确保 Windows 下中文不乱码
export PYTHONUTF8=1
